name: 🤖 Build JINI APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      # ── 1. Checkout code ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python 3.10 ───────────────────────────────────────────────
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ── 3. Install system dependencies ──────────────────────────────────────
      - name: Install system packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            openjdk-17-jdk \
            git zip unzip \
            libffi-dev libssl-dev python3-dev \
            build-essential autoconf libtool pkg-config \
            cmake ccache lld clang \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev

      # ── 4. Install Python build tools ───────────────────────────────────────
      - name: Install buildozer & cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython virtualenv

      # ── 5. Cache Android SDK / NDK / buildozer downloads ───────────────────
      - name: Cache buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      # ── 6. Accept Android SDK licenses ──────────────────────────────────────
      - name: Accept Android SDK licenses
        run: |
          mkdir -p ~/.android
          echo "# AUTO" > ~/.android/repositories.cfg

      # ── 7. Build the APK ────────────────────────────────────────────────────
      - name: Build APK with Buildozer
        run: |
          yes | buildozer -v android debug 2>&1
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      # ── 8. Upload APK as artifact ───────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: JINI-APK
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 30
